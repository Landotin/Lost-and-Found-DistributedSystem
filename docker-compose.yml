services:
  hub_dashboard:
    build:
      context: ./hub-dashboard
    ports:
      - "5005:80"
    environment:
      - VITE_HUB_API_URL=http://hub:5000/api
      - VITE_HUB_WS_URL=ws://hub:5000
      - VITE_ADMIN_SECRET=${ADMIN_SECRET:-changeme}
    depends_on:
      - hub

  hub:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - "5000:5000"
    command: sh -c "npm install && npx tsx src/index.ts"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  dept_ccs:
    build:
      context: ./client
    ports:
      - "5001:3000"
    environment:
      - DEPT_NAME=College of Computer Studies
      - SERVER_WS_URL=ws://hub:5000
      - DEPT_SECRET=${ADMIN_SECRET:-changeme}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      hub:
        condition: service_started

  dept_coe:
    build:
      context: ./client
    ports:
      - "5002:3000"
    environment:
      - DEPT_NAME=College of Engineering
      - SERVER_WS_URL=ws://hub:5000
      - DEPT_SECRET=${ADMIN_SECRET:-changeme}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      hub:
        condition: service_started
